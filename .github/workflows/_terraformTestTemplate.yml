name: Terraform Template

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Specifies the environment of the deployment."
      runner_label:
        required: false
        type: string
        description: "Specifies the runner label."
        default: "self-hosted"
      config:
        required: true
        type: string
        description: "Specifies the configuration folder for the deployment."
      terraform_version:
        required: true
        type: string
        description: "Specifies the terraform version."
      node_version:
        required: true
        type: number
        description: "Specifies the node version."
      tenant_id:
        required: true
        type: string
        description: "Specifies the tenant id of the deployment."
      subscription_id:
        required: true
        type: string
        description: "Specifies the subscription id of the deployment."
      run_azure_login:
        required: false
        type: boolean
        description: "Specifies whether the test should be executed."
        default: false
      run_test:
        required: false
        type: boolean
        description: "Specifies whether the test should be executed."
        default: true
      log_level_test:
        required: false
        type: string
        description: "Specifies the log level for the test run."
        default: "ERROR"
    secrets:
      CLIENT_ID:
        required: true
        description: "Specifies the client id."

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Terraform Lint
    runs-on: [ubuntu-latest]
    continue-on-error: false

    steps:
      # Setup Terraform
      - name: Setup Terraform
        id: terraform_setup
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true

      # Check Out Repository
      - name: Check Out Repository
        id: checkout_repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Terraform Format
      - name: Terraform Format
        id: terraform_format
        working-directory: "./modules/${{ inputs.config }}"
        run: |
          terraform fmt -check -recursive

      # Add Pull Request Comment
      - name: Add Pull Request Comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: pr_comment
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Lint Results
            * Terraform Version 📎\`${{ inputs.terraform_version }}\`
            * Working Directory 📂\`./modules/${{ inputs.config }}\`
            * Terraform Format and Style 🖌\`${{ steps.terraform_format.outcome }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  test:
    name: Terraform Test
    runs-on: ${{ inputs.runner_label }}
    continue-on-error: false
    environment: ${{ inputs.environment }}
    if: inputs.run_test
    needs: [lint]
    concurrency:
      group: terraform-test-${{ inputs.config }}-${{ inputs.environment }}
      cancel-in-progress: false

    env:
      ARM_TENANT_ID: ${{ inputs.tenant_id }}
      ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}
      ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      ARM_USE_OIDC: true
      FABRIC_TENANT_ID: ${{ inputs.tenant_id }}
      FABRIC_CLIENT_ID: ${{ secrets.CLIENT_ID }}
      FABRIC_USE_OIDC: true

    steps:
      # Setup Node
      - name: Setup Node
        id: node_setup
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      # Setup Terraform
      - name: Setup Terraform
        id: terraform_setup
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true

      # Check Out Repository
      - name: Check Out Repository
        id: checkout_repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Azure login
      - name: Azure login
        id: azure_login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        if: inputs.run_azure_login
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ inputs.tenant_id }}
          subscription-id: ${{ inputs.subscription_id }}

      # Terraform Override
      - name: Terraform Override
        run: |
          mv code/utilities/terraform_override.tf modules/${{ inputs.config }}

      # Terraform Init
      - name: Terraform Init
        id: terraform_init
        working-directory: "./modules/${{ inputs.config }}"
        run: |
          terraform init

      # Terraform Test
      - name: Terraform Test
        id: terraform_test
        working-directory: "./modules/${{ inputs.config }}"
        run: |
          terraform test
        env:
          TF_LOG: ${{ inputs.log_level_test }}

      # Add Pull Request Comment
      - name: Add Pull Request Comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: pr_comment
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Test Results
            * Terraform Version 📎\`${{ inputs.terraform_version }}\`
            * Working Directory 📂\`./modules/${{ inputs.config }}\`
            * Terraform Tests 🖌\`${{ steps.terraform_test.outcome }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
